<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0b0d12;
  --surface:   #111318;
  --surface2:  #181b23;
  --surface3:  #1e222d;
  --border:    #1f2330;
  --border2:   #2a3045;
  --text:      #d8dff0;
  --muted:     #7080a0;
  --dim:       #9aaabf;
  --accent:    #f0a03c;
  --accent-d:  rgba(240,160,60,.12);
  --accent-d2: rgba(240,160,60,.22);
  --green:     #3fd68a;
  --green-d:   rgba(63,214,138,.10);
  --red:       #f06060;
  --blue:      #5ba4f5;
  --blue-d:    rgba(91,164,245,.10);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --r: 6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:14px;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;gap:16px;
  padding:0 24px;height:52px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;
}
.logo{
  font-family:var(--mono);font-weight:700;font-size:11px;
  letter-spacing:2.5px;color:var(--accent);text-transform:uppercase;
  white-space:nowrap;user-select:none;
}
.sep{width:1px;height:20px;background:var(--border2);flex-shrink:0;}
.project-name{
  background:transparent;border:none;
  color:var(--text);font-family:var(--sans);font-size:14px;font-weight:500;
  padding:4px 8px;min-width:180px;max-width:300px;
  border-bottom:1px solid var(--border2);
  transition:border-color .2s;
}
.project-name:focus{outline:none;border-color:var(--accent);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.save-dot{
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
  text-transform:uppercase;
}
.save-dot.idle  {color:var(--muted);}
.save-dot.saving{color:var(--accent);}
.save-dot.saved {color:var(--green);}

/* ── STATS BAR ── */
.stats-bar{
  display:grid;
  grid-template-columns:repeat(5,1fr) 220px;
  background:var(--border);
  gap:1px;
  border-bottom:2px solid var(--border2);
}
.stat{
  background:var(--surface);
  padding:18px 22px;
  position:relative;
  overflow:hidden;
}
.stat::after{
  content:'';position:absolute;bottom:0;left:0;
  width:100%;height:2px;background:transparent;
  transition:background .3s;
}
.stat.accent::after{background:var(--accent);}
.stat.green::after {background:var(--green);}
.stat.red::after   {background:var(--red);}
.stat.blue::after  {background:var(--blue);}
.stat-lbl{
  font-size:9px;font-family:var(--mono);letter-spacing:2px;
  text-transform:uppercase;color:#8090b2;margin-bottom:6px;
}
.stat-val{
  font-family:var(--mono);font-size:26px;font-weight:700;
  color:var(--text);line-height:1;
}
.stat-val.accent{color:var(--accent);}
.stat-val.green {color:var(--green);}
.stat-val.red   {color:var(--red);}
.stat-val.blue  {color:var(--blue);}
.stat-sub{font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--mono);}
.stat-progress{
  background:var(--surface);
  padding:18px 22px;
  display:flex;flex-direction:column;justify-content:center;
}
.prog-header{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:10px;
}
.prog-lbl{font-size:9px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.prog-pct{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--accent);}
.prog-track{
  height:6px;background:var(--surface3);border-radius:3px;
  overflow:hidden;border:1px solid var(--border2);
}
.prog-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--accent),#f97316);
  transition:width .5s cubic-bezier(.4,0,.2,1);
}
.prog-sub{margin-top:8px;font-size:10px;font-family:var(--mono);color:var(--muted);}

/* ── TOOLBAR ── */
.toolbar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:10px 24px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
.t-sep{width:1px;height:22px;background:var(--border2);flex-shrink:0;}
.t-group{display:flex;align-items:center;gap:8px;}
.t-label{
  font-size:10px;font-family:var(--mono);letter-spacing:1px;
  text-transform:uppercase;color:#8090b2;white-space:nowrap;
}
.t-input{
  background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);
  color:var(--text);font-family:var(--mono);font-size:12px;
  padding:5px 10px;text-align:center;
  transition:border-color .2s;
}
.t-input:focus{outline:none;border-color:var(--accent);}
.t-input.w60{width:60px;}
.t-input.w90{width:90px;}
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 13px;border-radius:var(--r);
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text);font-family:var(--sans);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1.4;
}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.primary{
  background:var(--accent-d);border-color:var(--accent);color:var(--accent);
}
.btn.primary:hover{background:var(--accent-d2);}
.btn.danger:hover{border-color:var(--red);color:var(--red);}
.ml-auto{margin-left:auto;}

/* ── DROPDOWN ── */
.dropdown{position:relative;}
.dropdown-menu{
  display:none;position:absolute;
  top:calc(100% + 6px);right:0;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--r);min-width:160px;z-index:300;
  box-shadow:0 8px 32px rgba(0,0,0,.5);overflow:hidden;
}
.dropdown-menu.open{display:block;}
.dd-item{
  padding:9px 16px;cursor:pointer;
  font-size:12px;font-family:var(--sans);
  transition:background .12s;
  border-bottom:1px solid var(--border);
}
.dd-item:last-child{border-bottom:none;}
.dd-item:hover{background:var(--accent-d);color:var(--accent);}
.dd-sep{height:1px;background:var(--border2);margin:4px 0;}

/* ── TABLE WRAPPER ── */
.table-wrap{
  overflow:auto;
  padding:20px 24px 40px;
  max-height:calc(100vh - 260px);
}

/* ── TABLE ── */
table{
  border-collapse:separate;border-spacing:0;
  font-family:var(--mono);font-size:12px;
  min-width:100%;
}
th,td{border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
th:last-child,td:last-child{border-right:none;}

/* HEADER */
thead th{
  background:var(--surface2);
  position:sticky;top:0;z-index:30;
}
.th-lang-cell{
  background:var(--surface3) !important;
  min-width:110px;
  position:sticky;left:0;z-index:40;
  padding:11px 16px;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);text-align:left;
  border-right:2px solid var(--border2) !important;
}
.th-prod{min-width:110px;text-align:center;position:relative;}
.th-prod-inner{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 12px;
}
.prod-input{
  background:transparent;border:none;
  color:var(--text);font-family:var(--mono);font-size:11px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;text-align:center;
  width:100%;min-width:80px;cursor:pointer;transition:color .15s;
  white-space:normal;word-break:break-word;line-height:1.4;
  resize:none;overflow:hidden;
}
.prod-input:focus{outline:none;color:var(--accent);border-bottom:1px solid var(--accent);}
/* Stat label in th */
.th-stat-label{
  display:block;
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  font-family:var(--mono);font-weight:500;
  padding:2px 0;
}
.col-del{
  background:none;border:none;cursor:pointer;
  color:var(--muted);font-size:9px;padding:2px 4px;
  opacity:0;transition:all .15s;
}
.th-prod:hover .col-del{opacity:1;color:var(--red);}
.th-stat-cell{
  min-width:82px;text-align:center;
  padding:11px 14px;
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#a0afc8;
}
.th-stat-cell.accent{color:var(--accent);}
.th-stat-cell.blue  {color:var(--blue);}

/* BODY ROWS */
.tr-lang{transition:background .1s;}
.tr-lang:hover .td-qty-cell  {background:rgba(255,255,255,.012);}
.tr-lang:hover .td-stat-cell {background:rgba(255,255,255,.012);}
.tr-lang:hover .td-lang-cell {background:var(--surface3);}

.td-lang-cell{
  background:var(--surface2);
  position:sticky;left:0;z-index:10;
  padding:8px 12px;
  border-right:2px solid var(--border2) !important;
}
.lang-cell-inner{display:flex;align-items:center;gap:8px;}
.lang-input{
  background:transparent;border:none;
  color:var(--text);font-family:var(--mono);font-size:12px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;width:42px;
  transition:color .15s;
}
.lang-input:focus{outline:none;color:var(--accent);}
.row-del{
  background:none;border:none;cursor:pointer;
  color:var(--muted);font-size:10px;padding:2px;
  opacity:0;transition:all .15s;margin-left:auto;
}
.tr-lang:hover .row-del{opacity:1;}
.row-del:hover{color:var(--red);}

.td-qty-cell{text-align:center;background:var(--bg);}
.qty-inp{
  background:transparent;border:none;
  color:var(--dim);font-family:var(--mono);font-size:12px;
  text-align:center;width:100%;padding:10px 10px;
  transition:all .12s;cursor:pointer;
}
.qty-inp:hover{background:rgba(255,255,255,.025);color:var(--text);}
.qty-inp:focus{
  outline:none;background:var(--accent-d);
  color:var(--accent);font-weight:700;
}
.qty-inp::placeholder{color:var(--border2);}
/* hide arrows */
.qty-inp::-webkit-outer-spin-button,.qty-inp::-webkit-inner-spin-button{-webkit-appearance:none;}
.qty-inp{-moz-appearance:textfield;}

.td-stat-cell{
  text-align:center;padding:10px 12px;
  font-size:11px;color:#a0afc8;
  background:var(--bg);
}
.td-stat-cell.quality{color:var(--text);font-weight:600;font-size:12px;}
.td-stat-cell.accent {color:var(--accent);}
.td-stat-cell.blue   {color:var(--blue);}
.td-stat-cell.muted  {color:#8090b2;font-size:10px;}

/* TOTAL ROW */
.tr-total td{
  background:var(--surface3);
  border-top:2px solid var(--border2);
}
.td-total-label{
  position:sticky;left:0;
  background:var(--surface3);
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:#a0afc8;padding:12px 16px;
  border-right:2px solid var(--border2) !important;
}
.td-total-qty{
  text-align:center;padding:10px 12px;
  font-size:11px;color:#a0afc8;
}
.td-total-stat{
  text-align:center;padding:10px 12px;
  font-size:12px;font-weight:700;
}
.td-total-stat.quality{color:var(--text);font-size:14px;}
.td-total-stat.accent {color:var(--accent);font-size:14px;}
.td-total-stat.blue   {color:var(--blue);}
.td-total-stat.muted  {color:#8090b2;font-size:10px;font-weight:400;}

/* ── MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.65);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
.modal-bg.open{display:flex;}
.modal{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:10px;padding:28px 32px;min-width:340px;
  box-shadow:0 16px 48px rgba(0,0,0,.6);
}
.modal h3{
  font-size:13px;font-family:var(--mono);letter-spacing:1.5px;
  text-transform:uppercase;color:var(--accent);margin-bottom:20px;
}
.modal-field{margin-bottom:14px;}
.modal-field label{
  display:block;font-size:10px;font-family:var(--mono);letter-spacing:1px;
  text-transform:uppercase;color:var(--muted);margin-bottom:6px;
}
.modal-input{
  width:100%;background:var(--surface3);
  border:1px solid var(--border2);border-radius:var(--r);
  color:var(--text);font-family:var(--mono);font-size:13px;
  padding:9px 12px;transition:border-color .2s;
}
.modal-input:focus{outline:none;border-color:var(--accent);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--r);padding:11px 18px;
  font-size:11px;font-family:var(--mono);color:var(--green);
  box-shadow:0 8px 28px rgba(0,0,0,.5);
  transform:translateY(60px);opacity:0;
  transition:all .28s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1;}

/* ── ACCOUNT + CLOUD ── */
.account-input{
  background:transparent;border:none;
  color:var(--text);font-family:var(--mono);font-size:12px;
  padding:4px 8px;width:140px;
  border-bottom:1px solid var(--border2);
  transition:border-color .2s;
}
.account-input:focus{outline:none;border-color:var(--accent);}
.account-input::placeholder{color:var(--muted);}
.btn-cloud{
  padding:5px 12px;border-radius:var(--r);
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--muted);font-family:var(--mono);font-size:10px;
  letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-cloud:hover{border-color:var(--accent);color:var(--accent);}
.cloud-status{
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
  text-transform:uppercase;padding:4px 10px;border-radius:20px;
  white-space:nowrap;
}
.cloud-status.disconnected{color:var(--muted);}
.cloud-status.connecting  {color:var(--accent);animation:blink 1s infinite;}
.cloud-status.connected   {color:var(--green);}
.cloud-status.error       {color:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}

::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--dim);}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">▸ BannerTrack</div>
  <div class="sep"></div>
  <input id="projectName" class="project-name" type="text" placeholder="Project name…">
  <div class="sep"></div>
  <input id="accountName" class="account-input" type="text" placeholder="Account ID…" title="Enter account name to sync across devices">
  <button class="btn-cloud" id="connectBtn" onclick="connectAccount()">Connect</button>
  <div class="cloud-status disconnected" id="cloudStatus">○ offline</div>
  <div class="topbar-right">
    <span class="save-dot idle" id="saveIndicator">● IDLE</span>
  </div>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat-lbl">Total Quality</div>
    <div class="stat-val" id="sQuality">0</div>
    <div class="stat-sub">banners total</div>
  </div>
  <div class="stat">
    <div class="stat-lbl">Total Minutes</div>
    <div class="stat-val" id="sMinutes">0</div>
    <div class="stat-sub">estimated</div>
  </div>
  <div class="stat accent">
    <div class="stat-lbl">Total Hours</div>
    <div class="stat-val accent" id="sHours">0.00</div>
    <div class="stat-sub" id="sDays">0.00 days</div>
  </div>
  <div class="stat green">
    <div class="stat-lbl">Fill</div>
    <div class="stat-val green" id="sFill">0.00</div>
    <div class="stat-sub">hrs logged</div>
  </div>
  <div class="stat red">
    <div class="stat-lbl">Remain</div>
    <div class="stat-val" id="sRemain">0.00</div>
    <div class="stat-sub">hrs remaining</div>
  </div>
  <div class="stat-progress">
    <div class="prog-header">
      <span class="prog-lbl">Progress</span>
      <span class="prog-pct" id="sPct">0%</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="progFill" style="width:0%"></div>
    </div>
    <div class="prog-sub" id="progSub">—</div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="t-group">
    <button class="btn primary" onclick="openAddLang()">+ Language</button>
    <button class="btn primary" onclick="openAddProduct()">+ Product</button>
  </div>
  <div class="t-sep"></div>
  <div class="t-group">
    <span class="t-label">min / banner</span>
    <input id="minsInput" class="t-input w60" type="number" value="40" min="1" step="1" onchange="onConfigChange()">
  </div>
  <div class="t-sep"></div>
  <div class="t-group">
    <span class="t-label">fill (hrs)</span>
    <input id="fillInput" class="t-input w90" type="number" value="0" min="0" step="0.5" onchange="onConfigChange()">
  </div>
  <div class="t-sep"></div>
  <div class="t-group">
    <button class="btn" id="saveCloudBtn" onclick="saveToCloud()" disabled title="Connect an account first">☁ Save</button>
    <button class="btn" id="loadCloudBtn" onclick="loadFromCloud()" disabled title="Connect an account first">↓ Load</button>
  </div>
  <div class="t-sep"></div>
  <div class="t-group ml-auto">
    <div class="dropdown">
      <button class="btn" id="exportBtn" onclick="toggleDD()">Export ▾</button>
      <div class="dropdown-menu" id="exportMenu">
        <div class="dd-item" onclick="exportCSV()">📋 Export CSV</div>
        <div class="dd-item" onclick="exportJSON()">📄 Export JSON</div>
        <div class="dd-sep"></div>
        <div class="dd-item" onclick="importJSON()">📥 Import JSON</div>
      </div>
    </div>
  </div>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table id="mainTable">
    <thead id="tHead"></thead>
    <tbody id="tBody"></tbody>
    <tfoot id="tFoot"></tfoot>
  </table>
</div>

<!-- MODAL: Add Language -->
<div class="modal-bg" id="modalLang">
  <div class="modal">
    <h3>Add Language</h3>
    <div class="modal-field">
      <label>Language Code (e.g. FR, DE, JP)</label>
      <input id="langCodeInput" class="modal-input" type="text" maxlength="6" placeholder="AT" style="text-transform:uppercase;">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modalLang')">Cancel</button>
      <button class="btn primary" onclick="confirmAddLang()">Add</button>
    </div>
  </div>
</div>

<!-- MODAL: Add Product -->
<div class="modal-bg" id="modalProduct">
  <div class="modal">
    <h3>Add Product</h3>
    <div class="modal-field">
      <label>Product Name (e.g. Kitchen, Laundry)</label>
      <input id="productNameInput" class="modal-input" type="text" maxlength="20" placeholder="Kitchen">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modalProduct')">Cancel</button>
      <button class="btn primary" onclick="confirmAddProduct()">Add</button>
    </div>
  </div>
</div>

<!-- HIDDEN import input -->
<input type="file" id="importInput" accept=".json" style="display:none" onchange="handleImport(event)">

<div class="toast" id="toast"></div>

<script>
// ── UTILS ──────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function autoResizeTA(el){
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
}

// ── STATE ──────────────────────────────────────────────────────
let S = {
  projectName: '',
  minsPerBanner: 40,
  fillHours: 0,
  languages: [],
  products:  [],
  matrix: {}
};

// ── HELPERS ────────────────────────────────────────────────────
function qty(lang, prod){ return (S.matrix[lang] || {})[prod] || 0; }
function setQty(lang, prod, v){ if(!S.matrix[lang]) S.matrix[lang]={}; S.matrix[lang][prod] = isNaN(v)||v<0?0:v; }
function rowQ(lang){ return S.products.reduce((s,p)=>s+qty(lang,p),0); }
function colQ(prod){ return S.languages.reduce((s,l)=>s+qty(l,prod),0); }
function totalQ(){ return S.languages.reduce((s,l)=>s+rowQ(l),0); }

// ── RENDER TABLE ───────────────────────────────────────────────
function render(){
  if(S.languages.length === 0 || S.products.length === 0){
    document.getElementById('tHead').innerHTML = '';
    document.getElementById('tBody').innerHTML = `
      <tr><td colspan="99" style="text-align:center;padding:60px 24px;">
        <div style="font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);line-height:2.2;">
          ${S.products.length===0 ? '→ Add a <strong style="color:var(--accent)">Product</strong> to get started' : ''}
          ${S.languages.length===0 ? '<br>→ Add a <strong style="color:var(--accent)">Language</strong> to get started' : ''}
        </div>
      </td></tr>`;
    document.getElementById('tFoot').innerHTML = '';
    updateStats();
    return;
  }
  renderHead();
  renderBody();
  renderFoot();
  updateStats();
}

function renderHead(){
  let h = `<tr>
    <th class="th-lang-cell">Language</th>`;
  S.products.forEach((p,i)=>{
    h += `<th class="th-prod">
      <div class="th-prod-inner">
        <textarea class="prod-input" rows="1"
          onchange="renameProd(${i},this.value)"
          oninput="autoResizeTA(this)"
          title="Click to rename">${esc(p)}</textarea>
        <button class="col-del" onclick="deleteProd(${i})" title="Remove product">✕</button>
      </div></th>`;
  });
  h += `<th class="th-stat-cell quality">Quality</th>`;
  h += `<th class="th-stat-cell">Min</th>`;
  h += `<th class="th-stat-cell accent">Hours</th>`;
  h += `<th class="th-stat-cell blue">Days</th>`;
  h += `</tr>`;
  document.getElementById('tHead').innerHTML = h;
  // auto-resize all textareas after render
  document.querySelectorAll('.prod-input').forEach(autoResizeTA);
}

function renderBody(){
  let b = '';
  S.languages.forEach((lang,li)=>{
    const q = rowQ(lang);
    const m = q * S.minsPerBanner;
    const h = m / 60;
    const d = h / 8;
    b += `<tr class="tr-lang" data-li="${li}">
      <td class="td-lang-cell">
        <div class="lang-cell-inner">
          <input class="lang-input" value="${esc(lang)}"
            onchange="renameLang(${li},this.value)"
            maxlength="6" title="Rename">
          <button class="row-del" onclick="deleteLang(${li})" title="Remove">✕</button>
        </div>
      </td>`;
    S.products.forEach((prod,pi)=>{
      const v = qty(lang,prod);
      b += `<td class="td-qty-cell">
        <input class="qty-inp" type="number" value="${v||''}"
          min="0" placeholder="—"
          data-lang="${esc(lang)}" data-prod="${esc(prod)}"
          oninput="onQtyInput(this)">
      </td>`;
    });
    b += `<td class="td-stat-cell quality" id="rq-${li}">${q||'—'}</td>`;
    b += `<td class="td-stat-cell muted"   id="rm-${li}">${q?(m.toLocaleString()):'—'}</td>`;
    b += `<td class="td-stat-cell accent"  id="rh-${li}">${q?h.toFixed(2):'—'}</td>`;
    b += `<td class="td-stat-cell blue"    id="rd-${li}">${q?d.toFixed(2):'—'}</td>`;
    b += `</tr>`;
  });
  document.getElementById('tBody').innerHTML = b;
}

function renderFoot(){
  const tq = totalQ();
  const tm = tq * S.minsPerBanner;
  const th = tm / 60;
  const td = th / 8;
  let f = `<tr class="tr-total">
    <td class="td-total-label">TOTAL</td>`;
  S.products.forEach((p,i)=>{
    const cq = colQ(p);
    f += `<td class="td-total-qty" id="cq-${i}">${cq||'—'}</td>`;
  });
  f += `<td class="td-total-stat quality" id="ft-quality">${tq.toLocaleString()}</td>`;
  f += `<td class="td-total-stat muted"   id="ft-minutes">${tm.toLocaleString()}</td>`;
  f += `<td class="td-total-stat accent"  id="ft-hours">${th.toFixed(2)}</td>`;
  f += `<td class="td-total-stat blue"    id="ft-days">${td.toFixed(2)}</td>`;
  f += `</tr>`;
  document.getElementById('tFoot').innerHTML = f;
}

// ── INLINE UPDATE (no full re-render) ─────────────────────────
function onQtyInput(inp){
  const lang = inp.dataset.lang;
  const prod = inp.dataset.prod;
  const v = parseInt(inp.value) || 0;
  setQty(lang, prod, v);

  // Update row stats
  const li = S.languages.indexOf(lang);
  const q = rowQ(lang);
  const m = q * S.minsPerBanner;
  const h = m / 60;
  const d = h / 8;
  document.getElementById(`rq-${li}`).textContent = q||'—';
  document.getElementById(`rm-${li}`).textContent = q?m.toLocaleString():'—';
  document.getElementById(`rh-${li}`).textContent = q?h.toFixed(2):'—';
  document.getElementById(`rd-${li}`).textContent = q?d.toFixed(2):'—';

  // Update col total
  const pi = S.products.indexOf(prod);
  const cqEl = document.getElementById(`cq-${pi}`);
  if(cqEl){ const cq=colQ(prod); cqEl.textContent=cq||'—'; }

  // Update grand totals
  const tq = totalQ();
  const tm = tq * S.minsPerBanner;
  const th2 = tm / 60;
  const td = th2 / 8;
  document.getElementById('ft-quality').textContent = tq.toLocaleString();
  document.getElementById('ft-minutes').textContent = tm.toLocaleString();
  document.getElementById('ft-hours').textContent   = th2.toFixed(2);
  document.getElementById('ft-days').textContent    = td.toFixed(2);

  updateStats();
  schedSave();
}

function updateStats(){
  const minsPerB = parseInt(document.getElementById('minsInput').value)||40;
  const fill     = parseFloat(document.getElementById('fillInput').value)||0;
  S.minsPerBanner = minsPerB;
  S.fillHours     = fill;

  const tq   = totalQ();
  const tm   = tq * minsPerB;
  const th   = tm / 60;
  const td   = th / 8;
  const rem  = Math.max(0, th - fill);
  const pct  = th>0 ? Math.min(100,(fill/th)*100) : 0;

  document.getElementById('sQuality').textContent = tq.toLocaleString();
  document.getElementById('sMinutes').textContent = tm.toLocaleString();
  document.getElementById('sHours').textContent   = th.toFixed(2);
  document.getElementById('sDays').textContent    = td.toFixed(2)+' days';
  document.getElementById('sFill').textContent    = fill.toFixed(2);
  document.getElementById('sRemain').textContent  = rem.toFixed(2);

  const remEl = document.getElementById('sRemain');
  remEl.className = rem<=0 ? 'stat-val green' : 'stat-val red';

  document.getElementById('sPct').textContent     = pct.toFixed(1)+'%';
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progSub').textContent  =
    fill>0 ? `${fill.toFixed(1)} / ${th.toFixed(1)} hrs logged` : 'No hours logged yet';
}

function onConfigChange(){ updateStats(); schedSave(); }

// ── RENAME / DELETE ────────────────────────────────────────────
function renameProd(i, newName){
  const old = S.products[i];
  const nw  = newName.trim().toUpperCase();
  if(!nw){ toast('Name cannot be empty'); return; }
  if(S.products.includes(nw) && nw!==old){ toast('Product already exists'); return; }
  S.products[i] = nw;
  S.languages.forEach(l=>{
    if(!S.matrix[l]) return;
    if(old in S.matrix[l]){
      S.matrix[l][nw] = S.matrix[l][old];
      if(nw!==old) delete S.matrix[l][old];
    }
  });
  schedSave();
}

function renameLang(i, newName){
  const old = S.languages[i];
  const nw  = newName.trim().toUpperCase();
  if(!nw){ toast('Code cannot be empty'); return; }
  if(S.languages.includes(nw) && nw!==old){ toast('Language already exists'); return; }
  S.languages[i] = nw;
  if(S.matrix[old]){ S.matrix[nw]=S.matrix[old]; if(nw!==old) delete S.matrix[old]; }
  schedSave();
}

function deleteProd(i){
  if(S.products.length<=1){ toast('Need at least 1 product'); return; }
  const name = S.products[i];
  if(!confirm(`Remove product "${name}"? This deletes all its data.`)) return;
  S.products.splice(i,1);
  S.languages.forEach(l=>{ if(S.matrix[l]) delete S.matrix[l][name]; });
  render(); toast(`Removed: ${name}`);
}

function deleteLang(i){
  if(S.languages.length<=1){ toast('Need at least 1 language'); return; }
  const name = S.languages[i];
  if(!confirm(`Remove language "${name}"? This deletes all its data.`)) return;
  S.languages.splice(i,1);
  delete S.matrix[name];
  render(); toast(`Removed: ${name}`);
}

// ── ADD LANGUAGE / PRODUCT ─────────────────────────────────────
function openAddLang(){
  document.getElementById('langCodeInput').value='';
  openModal('modalLang');
  setTimeout(()=>document.getElementById('langCodeInput').focus(),80);
}
function confirmAddLang(){
  const code = document.getElementById('langCodeInput').value.trim().toUpperCase();
  if(!code){ toast('Enter a language code'); return; }
  if(S.languages.includes(code)){ toast(`"${code}" already exists`); return; }
  S.languages.push(code);
  closeModal('modalLang');
  render(); toast(`Added: ${code}`);
}

function openAddProduct(){
  document.getElementById('productNameInput').value='';
  openModal('modalProduct');
  setTimeout(()=>document.getElementById('productNameInput').focus(),80);
}
function confirmAddProduct(){
  const name = document.getElementById('productNameInput').value.trim().toUpperCase();
  if(!name){ toast('Enter a product name'); return; }
  if(S.products.includes(name)){ toast(`"${name}" already exists`); return; }
  S.products.push(name);
  closeModal('modalProduct');
  render(); toast(`Added: ${name}`);
}

// ── MODAL ──────────────────────────────────────────────────────
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(el=>{
  el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('open'); });
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') document.querySelectorAll('.modal-bg.open').forEach(m=>m.classList.remove('open'));
  if(e.key==='Enter'){
    if(document.getElementById('modalLang').classList.contains('open')) confirmAddLang();
    if(document.getElementById('modalProduct').classList.contains('open')) confirmAddProduct();
  }
});

// ── EXPORT / IMPORT ────────────────────────────────────────────
function toggleDD(){
  document.getElementById('exportMenu').classList.toggle('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.dropdown')) document.getElementById('exportMenu').classList.remove('open');
});

function exportCSV(){
  const rows = [['Language',...S.products,'Quality','Minutes','Hours','Days']];
  S.languages.forEach(lang=>{
    const q=rowQ(lang),m=q*S.minsPerBanner,h=m/60,d=h/8;
    rows.push([lang,...S.products.map(p=>qty(lang,p)),q,m,h.toFixed(2),d.toFixed(2)]);
  });
  const tq=totalQ(),tm=tq*S.minsPerBanner,th=tm/60,td=th/8;
  rows.push(['TOTAL',...S.products.map(p=>colQ(p)),tq,tm,th.toFixed(2),td.toFixed(2)]);
  rows.push([]);
  rows.push(['Fill Hours',S.fillHours.toFixed(2)]);
  rows.push(['Remaining Hours',Math.max(0,th-S.fillHours).toFixed(2)]);

  const csv = rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  dlFile(csv, `${S.projectName}_${today()}.csv`,'text/csv');
  document.getElementById('exportMenu').classList.remove('open');
}

function exportJSON(){
  dlFile(JSON.stringify(S,null,2),`${S.projectName}_${today()}.json`,'application/json');
  document.getElementById('exportMenu').classList.remove('open');
}

function importJSON(){
  document.getElementById('importInput').click();
  document.getElementById('exportMenu').classList.remove('open');
}

function handleImport(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const data = JSON.parse(ev.target.result);
      if(!data.languages||!data.products||!data.matrix) throw new Error('Invalid format');
      S = data;
      document.getElementById('projectName').value = S.projectName||'';
      document.getElementById('minsInput').value   = S.minsPerBanner||40;
      document.getElementById('fillInput').value   = S.fillHours||0;
      render(); autoSave(); toast('Imported successfully');
    } catch(err){
      toast('Import failed: '+err.message);
    }
  };
  reader.readAsText(file);
  e.target.value='';
}

function dlFile(content, name, type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name; a.click();
  toast('Exported: '+name);
}
function today(){ return new Date().toISOString().split('T')[0]; }

// ── LOCALSTORAGE ───────────────────────────────────────────────
let saveTimer;
function schedSave(){
  const ind=document.getElementById('saveIndicator');
  ind.textContent='● SAVING…'; ind.className='save-dot saving';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(autoSave, 900);
}
function autoSave(){
  S.projectName   = document.getElementById('projectName').value;
  S.minsPerBanner = parseInt(document.getElementById('minsInput').value)||40;
  S.fillHours     = parseFloat(document.getElementById('fillInput').value)||0;
  try{ localStorage.setItem('bannerTracker_v2', JSON.stringify(S)); } catch(e){}
  const ind=document.getElementById('saveIndicator');
  ind.textContent='● SAVED'; ind.className='save-dot saved';
}

function loadState(){
  try{
    const raw = localStorage.getItem('bannerTracker_v2');
    if(raw){
      const parsed = JSON.parse(raw);
      S = parsed;
      document.getElementById('projectName').value = S.projectName||'Campaign 2025';
      document.getElementById('minsInput').value   = S.minsPerBanner||40;
      document.getElementById('fillInput').value   = S.fillHours||0;
      return true;
    }
  } catch(e){}
  return false;
}

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

// ── PROJECT NAME ───────────────────────────────────────────────
document.getElementById('projectName').addEventListener('input', schedSave);

// ── INIT ───────────────────────────────────────────────────────
const hadSaved = loadState();
render();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-firestore-compat.min.js"></script>
<script>
// ── FIREBASE INIT ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAAp2F-8zpv8svX3cdshHVvzDWyDzkWPuM",
  authDomain: "task-manager-personal-f543e.firebaseapp.com",
  projectId: "task-manager-personal-f543e",
  storageBucket: "task-manager-personal-f543e.firebasestorage.app",
  messagingSenderId: "439010018138",
  appId: "1:439010018138:web:e497a23cae97bc77e52963"
};

let db = null;
let cloudEnabled = false;
let currentAccount = '';

try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  cloudEnabled = true;
} catch(e) {
  console.warn('Firebase init failed:', e);
}

// Restore last account from localStorage
(function(){
  const saved = localStorage.getItem('bannerTracker_account');
  if(saved){
    document.getElementById('accountName').value = saved;
    // auto-connect silently
    _activateAccount(saved);
  }
})();

function setCloudStatus(state, label){
  const el = document.getElementById('cloudStatus');
  el.className = 'cloud-status ' + state;
  el.textContent = {
    disconnected: '○ offline',
    connecting:   '◌ connecting…',
    connected:    '● ' + (currentAccount || 'connected'),
    error:        '✕ error'
  }[state] || label;
  const on = (state === 'connected');
  document.getElementById('saveCloudBtn').disabled = !on;
  document.getElementById('loadCloudBtn').disabled = !on;
}

function connectAccount(){
  const name = document.getElementById('accountName').value.trim();
  if(!name){ toast('Enter an account name first'); return; }
  if(name.length < 3){ toast('Account name min 3 characters'); return; }
  _activateAccount(name);
}

function _activateAccount(name){
  if(!cloudEnabled){ toast('Firebase unavailable'); return; }
  currentAccount = name;
  localStorage.setItem('bannerTracker_account', name);
  setCloudStatus('connecting');
  // test connection with a quick get
  db.collection('bannerTracker').doc(name).get()
    .then(()=>{ setCloudStatus('connected'); toast('Connected: ' + name); })
    .catch(()=>{ setCloudStatus('error'); toast('Connection failed'); });
}

async function saveToCloud(){
  if(!cloudEnabled || !currentAccount){ toast('Not connected'); return; }
  // Sync config fields into S before saving
  S.projectName   = document.getElementById('projectName').value;
  S.minsPerBanner = parseInt(document.getElementById('minsInput').value)||40;
  S.fillHours     = parseFloat(document.getElementById('fillInput').value)||0;

  const ind = document.getElementById('saveIndicator');
  ind.textContent = '● SAVING…'; ind.className = 'save-dot saving';
  try {
    await db.collection('bannerTracker').doc(currentAccount).set({
      ...S,
      _updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    ind.textContent = '● CLOUD SAVED'; ind.className = 'save-dot saved';
    toast('☁ Saved to cloud — ' + currentAccount);
  } catch(e) {
    ind.textContent = '● ERROR'; ind.className = 'save-dot idle';
    toast('Save failed: ' + e.message);
    console.error(e);
  }
}

async function loadFromCloud(){
  if(!cloudEnabled || !currentAccount){ toast('Not connected'); return; }
  const ind = document.getElementById('saveIndicator');
  ind.textContent = '● LOADING…'; ind.className = 'save-dot saving';
  try {
    const doc = await db.collection('bannerTracker').doc(currentAccount).get();
    if(!doc.exists){ toast('No cloud data for: ' + currentAccount); ind.textContent='● IDLE'; return; }
    const data = doc.data();
    // Merge into S — guard against missing fields
    S.projectName   = data.projectName   || '';
    S.minsPerBanner = data.minsPerBanner || 40;
    S.fillHours     = data.fillHours     || 0;
    S.languages     = data.languages     || [];
    S.products      = data.products      || [];
    S.matrix        = data.matrix        || {};
    // Update inputs
    document.getElementById('projectName').value = S.projectName;
    document.getElementById('minsInput').value   = S.minsPerBanner;
    document.getElementById('fillInput').value   = S.fillHours;
    // Also update localStorage
    try{ localStorage.setItem('bannerTracker_v2', JSON.stringify(S)); }catch(e){}
    render();
    ind.textContent = '● CLOUD LOADED'; ind.className = 'save-dot saved';
    toast('↓ Loaded from cloud — ' + currentAccount);
  } catch(e) {
    ind.textContent = '● ERROR'; ind.className = 'save-dot idle';
    toast('Load failed: ' + e.message);
    console.error(e);
  }
}

// Enter key on account input triggers connect
document.getElementById('accountName').addEventListener('keydown', e=>{
  if(e.key === 'Enter') connectAccount();
});
</script>
</body>
